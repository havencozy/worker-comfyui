name: Manual Build All Video Targets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The release version tag to build and push (e.g., 1.2.3)"
        required: true
        type: string

jobs:
  build-video-targets:
    runs-on: [blacksmith-8vcpu-ubuntu-2204, linux]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - base
          - wan2.2-volume
          - wan2.2-14b

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Clear space to remove unused folders
        run: |
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf "/usr/local/share/boost"
          rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: blacksmith docker layer cache
        uses: useblacksmith/build-push-action@v1
        with:
          setup-only: true

      - name: Build and push ${{ matrix.target }}
        uses: docker/bake-action@v2
        env:
          DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}
          DOCKERHUB_IMG: ${{ vars.DOCKERHUB_IMG }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        with:
          push: true
          targets: ${{ matrix.target }}
          set: |
            *.args.HUGGINGFACE_ACCESS_TOKEN=${{ secrets.HUGGINGFACE_ACCESS_TOKEN }}

  update-dockerhub-description:
    runs-on: [blacksmith-8vcpu-ubuntu-2204, linux]
    needs: [build-video-targets]
    permissions:
      contents: read

    steps:
      - name: Update description on Docker Hub
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}
